repos:
  # Check yaml, end of file, trailing whitespace
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        name: check yaml
      - id: end-of-file-fixer
        name: fix end of file
      - id: trailing-whitespace
        name: trim trailing whitespace

  # Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        name: Lint and fix Python code
        args: [--fix]
      - id: ruff-format
        name: Format Python code

  # Static type checking
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check .
        language: system
        pass_filenames: false
        types: [python]

  # Check Apache license headers
  - repo: https://github.com/lucas-c/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: insert-license
        name: check license headers (Python)
        files: \.py$
        args:
          - --license-filepath
          - testing/utils/.license-header.txt
          - --comment-style
          - "#"
      - id: insert-license
        name: check license headers (Rust)
        files: \.rs$
        args:
          - --license-filepath
          - testing/utils/.license-header.txt
          - --comment-style
          - "//"
      - id: insert-license
        name: check license headers (CUDA)
        files: \.(cu|cuh)$
        args:
          - --license-filepath
          - testing/utils/.license-header.txt
          - --comment-style
          - "//"

  # Rust Linter
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        pass_filenames: false
        args: ['--manifest-path', 'qdp/Cargo.toml', '--all']
  - repo: local
    hooks:
      - id: clippy
        name: cargo clippy
        language: system
        pass_filenames: false
        entry: bash -c 'source .venv/bin/activate && LIBTORCH_USE_PYTORCH=1 cargo clippy "$@"' --
        args:
          - --manifest-path
          - qdp/Cargo.toml
          - --all-targets
          - --all-features
          - --
          - -D
          - warnings
