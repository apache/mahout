name: QDP Python ROCm Testing

on:
  push:
    branches: [main]
    paths:
      - "qdp/qdp-python/**"
      - ".github/workflows/qdp-python-rocm-testing.yml"
  pull_request:
    branches: [main]
    paths:
      - "qdp/qdp-python/**"
      - ".github/workflows/qdp-python-rocm-testing.yml"
  workflow_dispatch:

jobs:
  rocm-tests:
    runs-on: [self-hosted, linux, rocm]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install qdp-python test dependencies
        run: uv sync --project qdp/qdp-python --group dev --active

      - name: Run ROCm-marked tests (must execute on ROCm runner)
        env:
          PYTHONPATH: qdp/qdp-python
        run: uv run --project qdp/qdp-python pytest -m rocm qdp/qdp-python/tests -q
