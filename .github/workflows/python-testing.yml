name: Python Testing

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "qdp/qdp-core/**/*.rs"
      - "qdp/qdp-kernels/**/*.rs"
      - "qdp/qdp-python/**/*.rs"
      - "qdp/**/Cargo.toml"
      - ".github/workflows/python-testing.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "pyproject.toml"
      - "qdp/qdp-core/**/*.rs"
      - "qdp/qdp-kernels/**/*.rs"
      - "qdp/qdp-python/**/*.rs"
      - "qdp/**/Cargo.toml"
      - ".github/workflows/python-testing.yml"
  workflow_dispatch:

jobs:
  rust-check:
    # Fast gate: type-check both with and without CUDA stubs so duplicate
    # stub definitions or cfg mismatches fail in ~30s instead of surfacing
    # during the slower maturin build below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check (no-CUDA stubs)
        working-directory: qdp
        env:
          QDP_NO_CUDA: "1"
        run: cargo check --workspace --tests

  test:
    needs: rust-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build QDP extension
        uses: PyO3/maturin-action@v1
        with:
          working-directory: qdp/qdp-python
          command: develop
          args: --release
          sccache: true

      - name: Install PyTorch (CPU)
        run: uv pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: uv run pytest -n auto testing/ -v
