loaders:
  - type: python
    search_path:
      - ../..
    modules:
      - qumat.qumat

# TODO: Trim this filter once the Python package exposes a cleaner public
# surface for documentation generation.
processors:
  - type: filter
    documented_only: false
    skip_empty_modules: true
    expression: >-
      (not name.startswith('_') or name == '__init__')
      and name not in ('annotations', 'Mapping', 'import_module', 'ModuleType', 'Any')
      and default()
  - type: smart

renderer:
  type: markdown
  descriptive_module_title: false
  descriptive_class_title: false
  add_module_prefix: false
  add_method_class_prefix: false
  render_toc: false
  render_module_header: false
